<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ホロライブ切り抜きアシスタント</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-logo">
      <span class="logo-scissors">✂</span>
      <span class="logo-text">ホロライブ<span class="logo-accent">切り抜き</span>アシスタント</span>
    </div>
    <p class="app-subtitle">配信スケジュール・アーカイブ・参考切り抜き・動画分析・ファン反応</p>
  </header>

  <nav class="tab-nav">
    <button class="tab-btn active" data-tab="schedule">📅 スケジュール</button>
    <button class="tab-btn" data-tab="archives">📼 アーカイブ</button>
    <button class="tab-btn" data-tab="clips">✂️ 参考切り抜き</button>
    <button class="tab-btn" data-tab="analyze">✨ 動画分析</button>
    <button class="tab-btn" data-tab="search">🔍 ファン反応</button>
  </nav>

  <main class="app-main">

    <!-- スケジュールタブ -->
    <section id="tab-schedule" class="tab-panel active">
      <div class="panel-header">
        <h2>配信スケジュール</h2>
        <p class="panel-desc">ライブ中・予約配信を表示します。メンバーを選択して絞り込めます</p>
      </div>
      <div class="member-filter-slot" id="schedule-member-filter"></div>
      <div class="video-grid" id="schedule-videos"></div>
    </section>

    <!-- アーカイブタブ -->
    <section id="tab-archives" class="tab-panel">
      <div class="panel-header">
        <h2>最近のアーカイブ</h2>
        <p class="panel-desc">公式配信のアーカイブを表示します</p>
      </div>
      <div class="filter-row">
        <select id="archive-member-select" class="select-input">
          <option value="">-- 全メンバー --</option>
        </select>
        <button id="archive-filter-btn" class="btn btn-primary">絞り込む</button>
      </div>
      <div class="video-grid" id="archive-videos"></div>
    </section>

    <!-- 参考切り抜きタブ -->
    <section id="tab-clips" class="tab-panel">
      <div class="panel-header">
        <h2>参考切り抜き</h2>
        <p class="panel-desc">ファンが作成した切り抜き動画です。切り抜きの参考にどうぞ</p>
      </div>
      <div class="video-grid" id="clips-videos"></div>
    </section>

    <!-- 動画分析タブ -->
    <section id="tab-analyze" class="tab-panel">
      <div class="panel-header">
        <h2>動画分析・切り抜き提案</h2>
        <p class="panel-desc">YouTubeのURLまたは動画IDを入力してください</p>
      </div>

      <form id="analyze-form" class="analyze-form">
        <div class="form-row">
          <input
            id="video-url-input"
            type="text"
            placeholder="https://www.youtube.com/watch?v=... または動画ID"
            class="text-input"
            required
          />
        </div>
        <div class="form-row">
          <select id="analyze-member-select" class="select-input">
            <option value="">-- メンバーを選択（任意） --</option>
          </select>
          <button type="submit" class="btn btn-primary">分析する</button>
        </div>
      </form>

      <div id="analyze-result"></div>
    </section>

    <!-- ファン反応タブ -->
    <section id="tab-search" class="tab-panel">
      <div class="panel-header">
        <h2>ファン反応を検索</h2>
        <p class="panel-desc">Yahoo! リアルタイム・YouTube・ニコニコでファンの反応を探せます</p>
      </div>
      <div id="search-container"></div>
    </section>

  </main>

  <footer class="app-footer">
    <p>ホロライブ切り抜きアシスタント</p>
  </footer>

  <script src="dist/bundle.js"></script>
</body>
</html>
